name: Deploy Backend (Registry Style)

on:
  push:
    branches: [main]
    paths: ["server/**"]
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          # Tags it with the commit SHA so every deploy is unique
          tags: ghcr.io/${{ github.repository }}:latest, ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Login to GHCR on the VPS
            echo ${{ secrets.PAT_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 2. Pull the fresh image
            docker pull ghcr.io/${{ github.repository }}:latest

            # 3. Restart the container
            docker stop yatadola-storyflix-api || true
            docker rm yatadola-storyflix-api || true

            docker run -d \
              --name yatadola-storyflix-api \
              --restart unless-stopped \
              -p 5000:5000 \
              --network pos-network \
              -v /home/asela/yatadola-storyflix-api/.env:/app/.env \
              -v /home/asela/yatadola-storyflix-api/backups:/app/backups \
              ghcr.io/${{ github.repository }}:latest

            # 4. Cleanup old images to save disk space
            docker image prune -f
